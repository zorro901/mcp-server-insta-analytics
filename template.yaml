AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  MCP Instagram Analytics — Lambda Function URL + DynamoDB.
  All resources are within AWS always-free tier (no 12-month-limited resources).

Parameters:
  SessionCookie:
    Type: String
    NoEcho: true
    Default: ""
    Description: Instagram browser sessionid cookie (optional)
  ApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Bearer token for Function URL access protection

Resources:
  # ----- DynamoDB Table (PROVISIONED 25/25 = always-free tier max) -----
  AnalyticsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mcp-insta-analytics
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 25
        WriteCapacityUnits: 25
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ----- IAM Role for Lambda -----
  McpFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mcp-insta-analytics-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt AnalyticsTable.Arn

  # ----- CloudWatch Log Group (1-week retention to stay under 5GB free) -----
  McpFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/mcp-insta-analytics
      RetentionInDays: 7

  # ----- Lambda Function -----
  McpFunction:
    Type: AWS::Lambda::Function
    DependsOn: McpFunctionLogGroup
    Properties:
      FunctionName: mcp-insta-analytics
      Runtime: python3.12
      Handler: mcp_insta_analytics.lambda_handler.handler
      Role: !GetAtt McpFunctionRole.Arn
      MemorySize: 256
      Timeout: 30
      ReservedConcurrentExecutions: 10
      LoggingConfig:
        LogGroup: /aws/lambda/mcp-insta-analytics
      Environment:
        Variables:
          INSTA_ANALYTICS_STORAGE_BACKEND: dynamodb
          INSTA_ANALYTICS_DYNAMODB_TABLE_NAME: mcp-insta-analytics
          INSTA_ANALYTICS_AWS_REGION: !Ref AWS::Region
          INSTA_ANALYTICS_FETCHER_BACKEND: instaloader
          INSTA_ANALYTICS_SESSION_COOKIE: !Ref SessionCookie
          INSTA_ANALYTICS_API_KEY: !Ref ApiKey
      # Placeholder — replaced by deploy.sh with actual zip
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "placeholder"}

  # ----- Function URL (NONE + app-layer Bearer token check) -----
  McpFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt McpFunction.Arn

  McpFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !GetAtt McpFunction.Arn
      FunctionUrlAuthType: NONE
      Principal: "*"

Outputs:
  FunctionUrl:
    Description: Lambda Function URL endpoint
    Value: !GetAtt McpFunctionUrl.FunctionUrl
  TableName:
    Description: DynamoDB table name
    Value: !Ref AnalyticsTable
